name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, without v. Defaults to app_version.py."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) {
            $version = python -c 'from pathlib import Path; import re; text=Path("src/omnivert/app_version.py").read_text(); print(re.search("__version__ = \"([^\"]+)\"", text).group(1))'
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Stamp release repo metadata
        run: python scripts/set_build_repo.py "${{ github.repository }}"

      - name: Compose release notes (bundled engine changelog)
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/compose_release_notes.py dist/release-notes.md

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Copy frontend into package
        run: python scripts/copy_web_assets.py

      - name: Install Python package and build tools
        run: python -m pip install -e ".[build]"

      - name: Build wheel
        run: python -m build --wheel

      - name: Freeze app
        run: pyinstaller packaging/app.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ steps.version.outputs.value }}" packaging\installer.iss

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $assets = @(Get-ChildItem dist/installer/*.exe, dist/*.whl -ErrorAction SilentlyContinue)
          $lines = foreach ($f in $assets) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($f.Name)"
          }
          $lines | Set-Content -Path dist/SHA256SUMS -Encoding ascii
          Get-Content dist/SHA256SUMS

      - name: Publish draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          # Drafts are built automatically but only reach users when a maintainer clicks
          # Publish — that click is the human approval gate for engine auto-bumps.
          draft: true
          body_path: dist/release-notes.md
          # Appends GitHub's auto-generated commit/PR notes below the engine changelog.
          generate_release_notes: true
          files: |
            dist/installer/*.exe
            dist/*.whl
            dist/SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: omnivert-${{ steps.version.outputs.value }}
          path: |
            dist/installer/*.exe
            dist/*.whl
