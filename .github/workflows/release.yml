name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, without v. Defaults to app_version.py."
        required: false
        type: string

permissions:
  contents: write

# One release build per version at a time. Don't cancel in-progress builds: a tag-push
# that arrives mid-build should queue, not kill the run that may be uploading assets.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Publishing a draft release creates its tag, which re-fires the `push: tags` trigger and
  # would rebuild + clobber the just-published release (action-gh-release would flip it back
  # to draft). Skip the build when a *published* release already exists for this tag.
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Skip if a published release already exists for this tag
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Not a tag push (event=${{ github.event_name }}); proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tag="${{ github.ref_name }}"
          state=$(gh release view "$tag" --repo "${{ github.repository }}" --json isDraft -q .isDraft 2>/dev/null || echo "missing")
          if [ "$state" = "false" ]; then
            echo "Published release $tag already exists; skipping duplicate build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No published release for $tag (state=$state); proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) {
            $version = python -c 'from pathlib import Path; import re; text=Path("src/omnivert/app_version.py").read_text(); print(re.search("__version__ = \"([^\"]+)\"", text).group(1))'
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Stamp release repo metadata
        run: python scripts/set_build_repo.py "${{ github.repository }}"

      - name: Compose release notes (bundled engine changelog)
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/compose_release_notes.py dist/release-notes.md

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Copy frontend into package
        run: python scripts/copy_web_assets.py

      - name: Install Python package and build tools
        run: python -m pip install -e ".[build]"

      - name: Build wheel
        run: python -m build --wheel

      - name: Freeze app
        run: pyinstaller packaging/app.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ steps.version.outputs.value }}" packaging\installer.iss

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $assets = @(Get-ChildItem dist/installer/*.exe, dist/*.whl -ErrorAction SilentlyContinue)
          $lines = foreach ($f in $assets) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($f.Name)"
          }
          $lines | Set-Content -Path dist/SHA256SUMS -Encoding ascii
          Get-Content dist/SHA256SUMS

      - name: Publish draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          # Drafts are built automatically but only reach users when a maintainer clicks
          # Publish — that click is the human approval gate for engine auto-bumps.
          draft: true
          body_path: dist/release-notes.md
          # Appends GitHub's auto-generated commit/PR notes below the engine changelog.
          generate_release_notes: true
          files: |
            dist/installer/*.exe
            dist/*.whl
            dist/SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: omnivert-${{ steps.version.outputs.value }}
          path: |
            dist/installer/*.exe
            dist/*.whl
