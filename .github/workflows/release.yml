name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, without v. Defaults to app_version.py."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) {
            $version = python -c 'from pathlib import Path; import re; text=Path("src/omnivert/app_version.py").read_text(); print(re.search("__version__ = \"([^\"]+)\"", text).group(1))'
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Stamp release repo metadata
        run: python scripts/set_build_repo.py "${{ github.repository }}"

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Copy frontend into package
        run: python scripts/copy_web_assets.py

      - name: Install Python package and build tools
        run: python -m pip install -e ".[build]"

      - name: Build wheel
        run: python -m build --wheel

      - name: Freeze app
        run: pyinstaller packaging/app.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ steps.version.outputs.value }}" packaging\installer.iss

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          files: |
            dist/installer/*.exe
            dist/*.whl
          generate_release_notes: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnivert-${{ steps.version.outputs.value }}
          path: |
            dist/installer/*.exe
            dist/*.whl
