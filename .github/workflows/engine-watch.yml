name: Watch Conversion Engine

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  pull-requests: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install version-parsing dependency
        run: python -m pip install --upgrade packaging

      - name: Check PyPI for newer conversion engine
        id: check
        run: python scripts/check_latest_engine.py

      - name: Dispatch guarded engine update
        if: steps.check.outputs.update_available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          branch="bot/conversion-engine-v${LATEST}"
          open=$(gh pr list --head "$branch" --state open --json number --jq 'length')
          if [ "$open" != "0" ]; then
            echo "An update PR for ${LATEST} is already open ($branch); skipping dispatch."
            exit 0
          fi
          gh workflow run engine-update.yml \
            --ref "${{ github.ref_name }}" \
            -f engine_version="${LATEST}"
