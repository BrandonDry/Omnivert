name: Guarded Engine Update

on:
  workflow_dispatch:
    inputs:
      engine_version:
        description: "Conversion engine version to bundle."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  update-engine:
    runs-on: windows-latest
    env:
      ENGINE_VERSION: ${{ inputs.engine_version }}
      BOT_BRANCH: bot/conversion-engine-v${{ inputs.engine_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pin new engine and bump app version
        id: versions
        shell: pwsh
        run: |
          python scripts/pin_engine_version.py "$env:ENGINE_VERSION"
          $appVersion = python scripts/bump_app_version.py
          python scripts/set_build_repo.py "${{ github.repository }}"
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Frontend typecheck/build
        run: npm run build --prefix frontend

      - name: Frontend lint
        run: npm run lint --prefix frontend

      - name: Copy frontend into package
        run: python scripts/copy_web_assets.py

      - name: Install updated Python package
        run: python -m pip install -e ".[build]"

      - name: Backend import checks
        run: python -m compileall src

      - name: Engine conversion smoke tests
        run: python tests/engine_smoke.py

      - name: Wheel build check
        run: python -m build --wheel

      - name: Create guarded pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: ${{ env.BOT_BRANCH }}
          delete-branch: true
          title: "Bundle conversion engine ${{ env.ENGINE_VERSION }}"
          commit-message: "Bundle conversion engine ${{ env.ENGINE_VERSION }}"
          body: |
            Bundled conversion engine updated to ${{ env.ENGINE_VERSION }}.

            Safety checks passed in this workflow:
            - backend import checks
            - representative conversion smoke tests (txt/csv/html + pdf/docx/pptx/xlsx)
            - frontend typecheck/build/lint
            - wheel build

            After merge this tags a release and builds a **draft** GitHub Release with the
            bundled MarkItDown changelog. Users are not prompted until a maintainer clicks
            **Publish** on that draft — that publish is the human approval gate.

      - name: Merge guarded PR and tag release
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --squash --delete-branch
          git fetch origin main --tags
          git checkout main
          git pull --ff-only origin main
          git tag "v${{ steps.versions.outputs.app_version }}"
          git push origin "v${{ steps.versions.outputs.app_version }}"
          gh workflow run release.yml --ref "v${{ steps.versions.outputs.app_version }}" -f version="${{ steps.versions.outputs.app_version }}"

      - name: Open failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh issue create `
            --title "Conversion engine $env:ENGINE_VERSION auto-update failed" `
            --body "The guarded engine update workflow failed for conversion engine $env:ENGINE_VERSION. Review the workflow logs before releasing this engine."
